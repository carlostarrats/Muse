<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Muse — cloud view (measured 3D poses)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { overflow: hidden; height: 100vh; background: #e6cfb5; }
  #canvas { position: absolute; }
  .card { position: absolute; left: 0; top: 0; cursor: pointer;
          transition: transform .5s cubic-bezier(.25,.85,.3,1), box-shadow .5s ease;
          box-shadow: 10px 18px 34px rgba(95,65,35,.28); }
  .card img { display: block; width: 100%; height: 100%; object-fit: cover; }
  .card:hover { box-shadow: 0 28px 60px rgba(60,40,20,.4); }
</style>
</head>
<body>
  <div id="canvas"></div>
<script>
// every card: position, size, and TRUE 3D rotation measured from the reference
// image by fitting a rigid tilted rectangle to each book's traced corners.
// rendered with per-card perspective identical to the fitting model (F=1100)
const REFW = 1999, REFH = 1064, F = 1100;
const POSES = [
  { w: 194.0, h: 219.4, cx: 337.5, cy: 199.4, rx: -33.0, ry: -30.4, rz: 47.5 },
  { w: 80.5, h: 224.2, cx: 487.5, cy: 417.8, rx: -29.8, ry: -28.6, rz: 23.9 },
  { w: 103.4, h: 180.8, cx: 605.4, cy: 387.6, rx: -20.9, ry: -21.6, rz: 22.3 },
  { w: 178.6, h: 147.3, cx: 384.9, cy: 579.5, rx: 20.4, ry: -19.1, rz: 6.3 },
  { w: 123.5, h: 175.2, cx: 553.9, cy: 593.1, rx: 11.4, ry: -10.0, rz: 11.2 },
  { w: 154.1, h: 230.8, cx: 771.9, cy: 567.1, rx: -11.2, ry: -10.2, rz: 10.4 },
  { w: 203.6, h: 237.9, cx: 941.4, cy: 493.5, rx: 23.6, ry: 21.8, rz: -8.5 },
  { w: 119.9, h: 153.5, cx: 1036.2, cy: 309.6, rx: -11.4, ry: 6.2, rz: 8.5 },
  { w: 113.4, h: 249.0, cx: 1187.6, cy: 375.8, rx: -27.3, ry: -25.3, rz: 25.9 },
  { w: 114.4, h: 219.8, cx: 1375.0, cy: 383.4, rx: 23.2, ry: 21.4, rz: 20.2 },
  { w: 177.3, h: 175.5, cx: 1537.1, cy: 288.7, rx: 7.4, ry: -12.0, rz: 15.9 },
  { w: 88.5, h: 138.1, cx: 1472.1, cy: 480.7, rx: 2.8, ry: -5.8, rz: 13.2 },
  { w: 248.8, h: 223.8, cx: 1681.8, cy: 417.6, rx: 16.9, ry: -17.8, rz: 16.3 },
  { w: 128.8, h: 159.7, cx: 1241.9, cy: 579.4, rx: 18.1, ry: -18.4, rz: 16.4 },
  { w: 216.2, h: 227.0, cx: 1088.6, cy: 669.5, rx: 14.4, ry: -13.9, rz: 25.9 },
  { w: 142.8, h: 190.0, cx: 1425.6, cy: 709.2, rx: -3.3, ry: -7.6, rz: 14.3 },
  { w: 162.4, h: 237.6, cx: 1603.4, cy: 748.5, rx: -0.3, ry: -8.0, rz: 21.0 },
  { w: 148.9, h: 137.0, cx: 1771.4, cy: 680.4, rx: 26.0, ry: -24.7, rz: 12.5 },
  { w: 124.3, h: 234.7, cx: 1275.4, cy: 849.0, rx: -16.1, ry: -16.1, rz: 25.4 },
  { w: 225.9, h: 242.6, cx: 228.8, cy: 843.4, rx: 21.9, ry: -13.3, rz: -4.9 },
  { w: 97.8, h: 297.9, cx: 420.1, cy: 918.1, rx: 31.7, ry: -26.2, rz: 30.8 },
  { w: 126.3, h: 188.5, cx: 634.0, cy: 789.6, rx: 11.6, ry: -14.1, rz: 21.7 },
  { w: 206.1, h: 301.9, cx: 848.2, cy: 831.0, rx: 24.7, ry: -14.7, rz: -6.8 },
  { w: 124.5, h: 231.7, cx: 974.2, cy: 821.7, rx: 7.2, ry: -9.5, rz: 8.8 },
  { w: 514.8, h: 114.6, cx: 1732.1, cy: 1006.4, rx: 8.8, ry: 0.4, rz: 0.4 },
];
const IMAGES = [
  'photo-1543466835-00a7907e9de1','photo-1441974231531-c6227db76b6e','photo-1507525428034-b723cf961d3e',
  'photo-1501785888041-af3ef285b470','photo-1470071459604-3b5ec3a7fe05','photo-1469474968028-56623f02e42e',
  'photo-1433086966358-54859d0ed716','photo-1490730141103-6cac27aaab94','photo-1502082553048-f009c37129b9',
  'photo-1426604966848-d7adac402bff','photo-1519125323398-675f0ddb6308','photo-1493246507139-91e8fad9978e',
  'photo-1506744038136-46273834b3fb','photo-1472214103451-9374bd1c798e','photo-1506905925346-21bda4d32df4',
  'photo-1465146344425-f00d5f5c8f07','photo-1501594907352-04cda38ebc29','photo-1518837695005-2083093ee35b',
  'photo-1447752875215-b2761acb3c5d','photo-1500530855697-b586d89ba3ee','photo-1493558103817-58b2924bce98',
  'photo-1543466835-00a7907e9de1','photo-1441974231531-c6227db76b6e','photo-1507525428034-b723cf961d3e',
  'photo-1501785888041-af3ef285b470',
];
const url = (u, w) => `https://images.unsplash.com/${u}?w=${w}&q=70&fit=crop`;

const canvas = document.getElementById('canvas');
let nodes = [];

function layout() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const k = Math.min(vw / REFW, vh / REFH);
  const CW = REFW * k, CH = REFH * k;
  canvas.style.width = CW + 'px'; canvas.style.height = CH + 'px';
  canvas.style.left = (vw - CW) / 2 + 'px'; canvas.style.top = (vh - CH) / 2 + 'px';
  nodes.forEach(n => {
    const p = n.p;
    const w = p.w * k, h = p.h * k;
    n.el.style.width = w + 'px'; n.el.style.height = h + 'px';
    n.home = `translate(${p.cx * k - w/2}px, ${p.cy * k - h/2}px) ` +
             `perspective(${F * k}px) rotateZ(${p.rz}deg) rotateY(${p.ry}deg) rotateX(${p.rx}deg)`;
    n.flat = `translate(${p.cx * k - w/2}px, ${p.cy * k - h/2}px) scale(1.15)`;
    if (!n.hovering) n.el.style.transform = n.home;
  });
}

nodes = POSES.map((p, i) => {
  const el = document.createElement('div');
  el.className = 'card';
  el.style.zIndex = 4 + Math.round(p.cy / 40);   // lower on canvas paints in front
  const img = document.createElement('img');
  img.src = url(IMAGES[i % IMAGES.length], 420);
  el.appendChild(img);
  canvas.appendChild(el);
  const n = { el, p, hovering: false, home: '', flat: '' };
  el.onmouseenter = () => { n.hovering = true; el.style.zIndex = 90; el.style.transform = n.flat; };
  el.onmouseleave = () => {
    n.hovering = false;
    el.style.transform = n.home;
    setTimeout(() => { el.style.zIndex = 4 + Math.round(p.cy / 40); }, 500);
  };
  return n;
});
layout();
window.addEventListener('resize', layout);
</script>
</body>
</html>
