<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <!-- Google Search Console domain-ownership proof (for the OAuth consent
       screen's authorized-domain requirement). Inert metadata. -->
  <meta name="google-site-verification" content="vuvV6p7wp-46rDS0smZfBEj1wZbXF08K7C7sFvIXo3E" />
  <!-- Defense-in-depth CSP fallback: the primary policy is served via _headers
       (which also sets frame-ancestors / Referrer-Policy, not expressible in a
       meta tag). This mirrors it so the page is never left with NO CSP if it's
       ever served somewhere _headers doesn't apply (preview host, renamed file). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src 'self' https://drive.google.com https://*.googleusercontent.com; script-src 'self'; style-src 'self'; base-uri 'none'; form-action 'none'">
  <title>Shared Collection</title>
  <!-- Favicons (same set as the marketing site). favicon.ico at the root is
       what link-unfurlers (Slack/iMessage) probe — without it they get the
       HTML 404 fallback and render no logo (empty icon slot). -->
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="favicon-light.png" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/png" href="favicon-dark.png" media="(prefers-color-scheme: dark)" />
  <link rel="icon" type="image/png" href="favicon-light.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon-v2.png" />
  <!-- Social link-preview (Open Graph / Twitter card). Static + one-for-all:
       scrapers don't run JS and can't read the #fragment, so the per-collection
       title/sender never reach them. Nothing personal is exposed here. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Muse — Image Library">
  <meta property="og:title" content="Someone shared images with you">
  <meta property="og:description" content="Tap to view the full collection.">
  <meta property="og:image" content="https://muse-share.pages.dev/share-img-v3.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Someone shared images with you">
  <meta name="twitter:description" content="Tap to view the full collection.">
  <meta name="twitter:image" content="https://muse-share.pages.dev/share-img-v3.jpg">
  <link rel="stylesheet" href="share.css">
</head>
<body>
  <!-- All text nodes are filled by share.js via textContent (never innerHTML).
       The manifest rides the URL fragment, so nothing personal reaches the
       server. data-state drives which UI shows (live / expired / unavailable). -->
  <div id="app" data-state="loading">
    <header class="bar">
      <div class="sig">
        <span id="intro" class="intro"></span>
        <button id="save" class="save" type="button">Save PDF</button>

        <!-- Backdrop switcher: each dot is filled with the shade it applies, so
             it needs no text. Sits just right of Save (same gap each side).
             Screen-only; wired + persisted in share.js. -->
        <div class="bg-switcher" role="group" aria-label="Background color">
          <button class="dot" type="button" data-bg="light" aria-label="White background"></button>
          <button class="dot" type="button" data-bg="grey" aria-label="Grey background"></button>
          <button class="dot" type="button" data-bg="dark" aria-label="Dark background"></button>
        </div>
      </div>

      <div class="from">
        <span id="label" class="label"></span>
        <span id="name" class="name"></span>
      </div>
    </header>

    <main id="grid" class="grid"></main>

    <!-- Grid sizer: floats bottom-center (screen + live only). Sets the column
         density. A custom div slider (shadcn-style) — native <input range>
         doesn't click-to-jump in Safari. Wired + persisted in share.js. -->
    <div class="grid-sizer">
      <span class="grid-sizer-label">Grid</span>
      <div id="cols" class="slider" role="slider" tabindex="0"
           aria-label="Number of columns"
           aria-valuemin="1" aria-valuemax="6" aria-valuenow="4">
        <div class="slider-track">
          <div class="slider-range"></div>
          <div class="slider-thumb"></div>
        </div>
      </div>
    </div>

    <div class="notice notice-expired">This share has expired.</div>
    <div class="notice notice-unavailable">This share is no longer available.</div>
  </div>

  <!-- Static legal links. Plain <a> navigations (allowed under default-src
       'none' — CSP restricts resource loads, not link clicks). Cloudflare Pages
       serves privacy.html / terms.html at the clean /privacy and /terms paths.
       Hidden in print so they don't bleed into the recipient's PDF. -->
  <footer class="legal">
    <span id="expires" class="expires"></span>
    <span class="legal-links">
      <a href="/privacy">Privacy</a>
      <span class="sep" aria-hidden="true">·</span>
      <a href="/terms">Terms</a>
    </span>
  </footer>

  <!-- Click-to-enlarge lightbox: a viewport overlay that blurs the page behind a
       centered copy of the clicked image. Reuses the already-loaded Drive
       thumbnail (no new request/origin). Close via ×, Esc, or a backdrop click.
       Screen-only (hidden in print); wired in share.js. -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Image preview" hidden>
    <figure class="lightbox-figure">
      <img id="lightbox-img" class="lightbox-img" alt="">
      <figcaption id="lightbox-name" class="lightbox-name"></figcaption>
    </figure>
    <button id="lightbox-close" class="lightbox-close" type="button" aria-label="Close">
      <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
        <path d="M6 6 L18 18 M18 6 L6 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
  </div>

  <script type="module" src="share.js"></script>
</body>
</html>
